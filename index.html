<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise For You ❤️👸🏻</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    width:100%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:40px;
}

h1{
    margin-bottom:20px;
}

#countdown{
    font-size:2rem;
    font-weight:bold;
    margin:20px 0;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:15px;
    font-size:1rem;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:white;
    color:#ff4f87;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.error{
    margin-top:15px;
}

#secret{
    display:none;
    justify-content:center;
    align-items:center;
    opacity:0;
}

#spotifyCode{
    width:90%;
    max-width:600px;
    border-radius:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="container">

<div id="lockedContent">

<div style="font-size:40px; margin-bottom:20px;">
🍒 🐶 🍒 🐶 🍒
</div>

<h1>👸🏿 Surprise For You ❤️</h1>

<p>Something special is waiting...</p>

<div id="countdown"></div>

<h3>Or enter the secret password:</h3>

<input
type="password"
id="password"
placeholder="Enter password">

<button onclick="checkPassword()">
Unlock ❤️
</button>

<div class="error" id="error"></div>

<div style="font-size:40px; margin-top:25px;">
🐶 🍒 🐶 🍒 🐶
</div>

</div>

<div id="secret">
    <img
    id="spotifyCode"
    src="spotify-code.png"
    alt="Spotify Code">
</div>

</div>

<script>

const correctPassword = "mybeanforeverx";

const revealDate = new Date("July 28, 2026 00:00:00").getTime();

const countdownEl = document.getElementById("countdown");

function unlockPage(){

    document.getElementById("lockedContent").style.display = "none";

    const secret = document.getElementById("secret");

    secret.style.display = "flex";

    setTimeout(() => {

        secret.style.animation = "fadeIn 2s forwards";

    },100);

}

function checkPassword(){

    const entered = document.getElementById("password").value;

    if(entered === correctPassword){

        unlockPage();

    } else {

        document.getElementById("error").innerHTML =
        "Wrong password ❤️";

    }

}

function updateCountdown(){

    const now = new Date().getTime();

    const distance = revealDate - now;

    if(distance <= 0){

        unlockPage();
        return;

    }

    const days = Math.floor(distance/(1000*60*60*24));

    const hours = Math.floor(
        (distance%(1000*60*60*24))
        /(1000*60*60)
    );

    const mins = Math.floor(
        (distance%(1000*60*60))
        /(1000*60)
    );

    const secs = Math.floor(
        (distance%(1000*60))
        /1000
    );

    countdownEl.innerHTML =
        days + "d "
        + hours + "h "
        + mins + "m "
        + secs + "s";

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
