<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Something Special Is Waiting…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — edit these to retheme the whole page
     ============================================================ */
  :root{
    --bg-deep:        #07050a;
    --bg-deep-2:      #0c0810;
    --bg-maroon:      #1c0a14;
    --ink:            #f6ece8;
    --rose:           #d9a9b8;
    --rose-dim:       #b98a9b;
    --neon:           #ff5d8f;
    --neon-soft:      #ffaecb;
    --neon-glow:      rgba(255, 93, 143, 0.55);
    --badge-bg:        rgba(36, 14, 22, 0.85);
    --line:           rgba(255, 174, 203, 0.35);
    --panel-radius:   18px;
    --display-font:   'Playfair Display', Georgia, serif;
    --script-font:    'Cormorant Garamond', Georgia, serif;
    --ui-font:        'Inter', -apple-system, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background:var(--bg-deep);
    color:var(--ink);
    font-family:var(--ui-font);
    overflow-x:hidden;
    scroll-behavior:smooth;
  }

  /* ---------- shared panel chrome ---------- */
  .panel{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:90px 24px 70px;
    overflow:hidden;
    text-align:center;
  }
  .panel.hidden{ display:none; }

  .panel--before{
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,93,143,0.10), transparent 55%),
      linear-gradient(180deg, #0a0610 0%, #0d0a14 55%, #120a13 100%);
  }
  .panel--after{
    background:
      radial-gradient(ellipse at 50% 100%, rgba(255,93,143,0.08), transparent 60%),
      linear-gradient(180deg, #0c0810 0%, #160a12 100%);
  }
  .panel--surprise{
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,93,143,0.12), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(255,93,143,0.10), transparent 50%),
      linear-gradient(180deg, #0a0610 0%, #150a12 100%);
  }

  /* corner status badge */
  .corner-badge{
    position:absolute;
    top:22px; left:22px;
    font-family:var(--ui-font);
    font-size:11px;
    font-weight:700;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--neon-soft);
    background:var(--badge-bg);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 14px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    z-index:5;
  }

  .content{
    position:relative;
    z-index:3;
    max-width:760px;
    margin:0 auto;
  }

  h1, h2{
    font-family:var(--display-font);
    font-weight:700;
    line-height:1.15;
    color:var(--ink);
  }
  .panel--before h1{ font-size:clamp(30px,5.5vw,52px); }
  .panel--after h2{ font-size:clamp(26px,4.5vw,40px); color:var(--neon-soft); }
  .panel--surprise h1{ font-size:clamp(34px,6.5vw,58px); color:var(--neon-soft); letter-spacing:.02em; }

  em{
    font-style:italic;
    color:var(--neon);
    font-weight:600;
  }

  .divider{
    color:var(--neon);
    font-size:18px;
    margin:18px auto;
    opacity:.85;
  }
  .divider::before, .divider::after{
    content:'';
    display:inline-block;
    width:90px;
    height:1px;
    background:var(--line);
    vertical-align:middle;
    margin:0 14px;
  }

  .sub{
    font-family:var(--ui-font);
    font-size:15px;
    letter-spacing:.04em;
    color:var(--rose);
    margin-bottom:40px;
  }

  /* ---------- countdown ---------- */
  .countdown{
    display:flex;
    gap:16px;
    justify-content:center;
    flex-wrap:wrap;
    margin:10px auto 50px;
  }
  .time-box{
    background:rgba(36,14,22,0.55);
    border:1px solid var(--line);
    border-radius:14px;
    width:108px;
    padding:20px 8px 16px;
  }
  .time-box span{
    display:block;
    font-family:var(--display-font);
    font-size:38px;
    font-weight:700;
    color:var(--neon-soft);
    text-shadow:0 0 18px var(--neon-glow);
  }
  .time-box label{
    display:block;
    margin-top:6px;
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--rose-dim);
  }

  .neon-heart{
    margin:10px auto 0;
    width:54px;
    height:54px;
    filter:drop-shadow(0 0 10px var(--neon-glow));
  }

  .password-divider{ margin-top:34px; }

  .edge-deco{
    position:absolute;
    inset:0;
    z-index:1;
    pointer-events:none;
  }
  .edge-emoji{
    position:absolute;
    opacity:.8;
    filter:drop-shadow(0 0 6px rgba(255,93,143,0.4));
  }
  @media (max-width: 640px){
    .edge-emoji{ font-size:14px !important; }
  }

  /* ---------- password gate ---------- */
  .password-row{
    position:relative;
    max-width:420px;
    margin:0 auto 24px;
  }
  #password-input{
    width:100%;
    background:rgba(20,10,16,0.6);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 46px 16px 18px;
    font-family:var(--ui-font);
    font-size:15px;
    color:var(--ink);
    outline:none;
    transition:border-color .2s;
  }
  #password-input::placeholder{ color:var(--rose-dim); }
  #password-input:focus{ border-color:var(--neon); }
  .lock-icon{
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    width:18px; height:18px;
    color:var(--rose-dim);
    pointer-events:none;
  }

  .btn-primary{
    display:inline-flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    background:linear-gradient(135deg, var(--neon), #c2447a);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:15px 34px;
    font-family:var(--ui-font);
    font-weight:600;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    text-decoration:none;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(255,93,143,0.35);
    transition:transform .15s, box-shadow .15s;
  }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(255,93,143,0.5); }
  .btn-primary:active{ transform:translateY(0); }

  .error{
    margin-top:16px;
    font-size:13px;
    color:#ff8fa8;
    opacity:0;
    transition:opacity .2s;
  }
  .error.show{ opacity:1; }
  .password-row.shake{ animation:shake .4s; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }

  /* ---------- surprise panel ---------- */
  .letter{
    font-family:var(--script-font);
    font-size:clamp(17px,2.4vw,21px);
    color:var(--rose);
    line-height:1.7;
    margin-bottom:18px;
  }
  .panel--surprise .letter{
    font-family:var(--display-font);
    font-style:italic;
    font-size:clamp(24px,4vw,34px);
    color:var(--neon-soft);
    line-height:1.5;
    max-width:600px;
    margin:0 auto 40px;
    text-shadow:0 0 18px var(--neon-glow);
  }
  .surprise-image{
    max-width:420px;
    margin:0 auto;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 34px rgba(0,0,0,0.5), 0 0 24px var(--neon-glow);
  }
  .surprise-image img{
    width:100%;
    display:block;
  }
  .reveal-line{
    font-family:var(--display-font);
    font-style:italic;
    font-size:clamp(22px,3.6vw,30px);
    color:var(--neon-soft);
    line-height:1.5;
    margin:30px 0 38px;
  }
  .reveal-line strong{ font-style:normal; color:#fff; }

  .spotify-embed{
    max-width:480px;
    margin:0 auto 14px;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .spotify-embed iframe{ width:100%; height:152px; border:none; display:block; }

  .caption{
    font-size:13px;
    color:var(--rose-dim);
    margin-bottom:38px;
  }

  .neon-sign{
    margin:30px auto 0;
    max-width:230px;
    border:2px solid var(--neon);
    border-radius:14px;
    padding:18px 14px;
    font-family:var(--script-font);
    font-style:italic;
    font-size:15px;
    color:var(--neon-soft);
    text-shadow:0 0 8px var(--neon-glow);
    box-shadow:0 0 22px var(--neon-glow), inset 0 0 14px rgba(255,93,143,0.18);
  }

  /* ---------- decorative corner icons ---------- */
  .deco{
    position:absolute;
    z-index:1;
    opacity:.9;
    filter:drop-shadow(0 0 6px rgba(255,93,143,0.35));
  }
  .deco--tl{ top:30px; left:30px; }
  .deco--tr{ top:30px; right:30px; }
  .deco--bl{ bottom:30px; left:30px; }
  .deco--br{ bottom:30px; right:30px; }
  @media (max-width: 640px){
    .deco{ transform:scale(.6); }
    .deco--tl,.deco--bl{ left:8px; }
    .deco--tr,.deco--br{ right:8px; }
  }

  /* twinkle stars */
  .stars{ position:absolute; inset:0; z-index:0; pointer-events:none; }
  .star{
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background:#fff;
    opacity:.6;
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{ opacity:.15; } 50%{ opacity:.9; } }

  /* confetti for surprise panel */
  .confetti{
    position:absolute;
    width:8px; height:14px;
    background:var(--neon-soft);
    opacity:.7;
    z-index:1;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{ transform:translateY(-40px) rotate(0deg); opacity:.9; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0; }
  }

  footer.credit{
    text-align:center;
    font-size:11px;
    color:var(--rose-dim);
    padding:18px;
    background:var(--bg-deep);
  }

  @media (prefers-reduced-motion: reduce){
    .star, .confetti{ animation:none; }
  }
</style>
</head>
<body>

<!-- ============================================================
     SECTION 1 — BEFORE the target date: countdown
     ============================================================ -->
<section id="before-section" class="panel panel--before">
  <div class="stars" id="stars-before"></div>

  <svg class="deco deco--tl" width="70" height="70" viewBox="0 0 70 70" fill="none" stroke="#ff5d8f" stroke-width="2"><path d="M35 60s-22-13.5-22-29A12 12 0 0135 21a12 12 0 0122 10c0 15.5-22 29-22 29z"/></svg>

  <div class="edge-deco" aria-hidden="true">
    <span class="edge-emoji" style="top:4%; left:8%; font-size:22px; transform:rotate(-8deg);">💕</span>
    <span class="edge-emoji" style="top:14%; left:3%; font-size:17px; transform:rotate(6deg);">🍒</span>
    <span class="edge-emoji" style="top:34%; left:6%; font-size:19px; transform:rotate(-4deg);">❤️</span>
    <span class="edge-emoji" style="top:58%; left:4%; font-size:16px; transform:rotate(10deg);">🍒</span>
    <span class="edge-emoji" style="top:80%; left:9%; font-size:20px; transform:rotate(-6deg);">💖</span>
    <span class="edge-emoji" style="top:92%; left:20%; font-size:16px; transform:rotate(4deg);">🍒</span>

    <span class="edge-emoji" style="top:6%; right:9%; font-size:18px; transform:rotate(8deg);">🍒</span>
    <span class="edge-emoji" style="top:18%; right:4%; font-size:21px; transform:rotate(-10deg);">💖</span>
    <span class="edge-emoji" style="top:40%; right:6%; font-size:17px; transform:rotate(5deg);">🍒</span>
    <span class="edge-emoji" style="top:60%; right:3%; font-size:19px; transform:rotate(-6deg);">❤️</span>
    <span class="edge-emoji" style="top:82%; right:8%; font-size:18px; transform:rotate(7deg);">💕</span>
    <span class="edge-emoji" style="top:94%; right:22%; font-size:16px; transform:rotate(-5deg);">🍒</span>

    <span class="edge-emoji" style="top:2%; left:42%; font-size:16px; transform:rotate(3deg);">🍒</span>
    <span class="edge-emoji" style="top:96%; left:46%; font-size:18px; transform:rotate(-4deg);">💕</span>
  </div>

  <div class="content">
    <h1>Something <em>special</em> is waiting&hellip;</h1>
    <div class="divider">♡</div>
    <p class="sub">The countdown has begun&nbsp;🍒</p>

    <div class="countdown">
      <div class="time-box"><span id="cd-days">--</span><label>Days</label></div>
      <div class="time-box"><span id="cd-hours">--</span><label>Hours</label></div>
      <div class="time-box"><span id="cd-mins">--</span><label>Minutes</label></div>
      <div class="time-box"><span id="cd-secs">--</span><label>Seconds</label></div>
    </div>

    <svg class="neon-heart" viewBox="0 0 54 54" fill="none" stroke="#ff5d8f" stroke-width="2.5">
      <path d="M27 47s-19-11.7-19-25A10.4 10.4 0 0127 12a10.4 10.4 0 0119 10c0 13.3-19 25-19 25z"/>
    </svg>

    <div class="divider password-divider">♡</div>
    <p class="sub">Enter the password to unlock your surprise</p>

    <form id="unlock-form" autocomplete="off">
      <div class="password-row" id="password-row">
        <input type="password" id="password-input" placeholder="Enter password" />
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/>
        </svg>
      </div>
      <button type="submit" class="btn-primary">Unlock surprise ♡</button>
      <p class="error" id="password-error">Not quite — try again.</p>
    </form>
  </div>
</section>

<!-- ============================================================
     SECTION 3 — SURPRISE reveal (shown after correct password)
     ============================================================ -->
<section id="surprise-section" class="panel panel--surprise hidden">
  <div class="stars" id="stars-surprise"></div>
  <div id="confetti-wrap"></div>

  <svg class="deco deco--tl" width="70" height="180" viewBox="0 0 70 180" fill="none" stroke="#ff5d8f" stroke-width="2">
    <path d="M35 178V60M35 60c-10 0-18-8-18-18M35 60c10 0 18-8 18-18M22 30h26M27 30V18M43 30V18M27 18h16M20 14l5 4M50 14l-5 4M30 14V8M40 14V8M35 8V2M22 70l-12 10M48 70l12 10"/>
  </svg>
  <svg class="deco deco--br" width="90" height="65" viewBox="0 0 90 65" fill="none" stroke="#ff5d8f" stroke-width="2"><ellipse cx="42" cy="36" rx="34" ry="16"/><circle cx="74" cy="24" r="11"/><ellipse cx="78" cy="16" rx="8" ry="5"/><path d="M14 42l-6 8M30 46l-3 9M58 46l3 9M66 18c4-4 10-4 12 0"/><path d="M40 50c-6 5-2 9 6 6"/></svg>

  <div class="content">
    <p class="letter">You mean the world to me, my little bean, and I wanted to give us something unforgettable 👑</p>

    <div class="surprise-image">
      <img src="spotify-code.png" alt="Spotify code" />
    </div>
  </div>
</section>

<footer class="credit">Made with ♡ for someone special</footer>

<script>
/* ============================================================
   CONFIG — edit these three lines to make this yours
   ============================================================ */
const CONFIG = {
  targetDate: new Date('2026-07-28T00:00:00'),  // when the countdown ends
  password:   'mybeanforeverx',                   // case-insensitive
  destinationUrl: null                            // e.g. a flight booking link for the CTA button, or leave null
};

/* ---------- helpers ---------- */
function pad(n){ return String(n).padStart(2,'0'); }

function showSection(name){
  document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
  document.getElementById(name + '-section').classList.remove('hidden');
}

/* ---------- countdown ---------- */
let timer = null;
function tick(){
  const diff = CONFIG.targetDate - new Date();
  if (diff <= 0){
    document.getElementById('cd-days').textContent  = '0';
    document.getElementById('cd-hours').textContent = '00';
    document.getElementById('cd-mins').textContent  = '00';
    document.getElementById('cd-secs').textContent  = '00';
    clearInterval(timer);
    return;
  }
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent  = days;
  document.getElementById('cd-hours').textContent = pad(hours);
  document.getElementById('cd-mins').textContent  = pad(mins);
  document.getElementById('cd-secs').textContent  = pad(secs);
}

/* ---------- password gate ---------- */
document.getElementById('unlock-form').addEventListener('submit', function(e){
  e.preventDefault();
  const input = document.getElementById('password-input');
  const row = document.getElementById('password-row');
  const errorEl = document.getElementById('password-error');
  const value = input.value.trim().toLowerCase();

  if (value === CONFIG.password.toLowerCase()){
    showSection('surprise');
    spawnConfetti();
  } else {
    errorEl.classList.add('show');
    row.classList.remove('shake');
    requestAnimationFrame(() => row.classList.add('shake'));
    input.value = '';
    input.focus();
  }
});

const ctaButton = document.getElementById('cta-button');
if (CONFIG.destinationUrl && ctaButton){
  ctaButton.href = CONFIG.destinationUrl;
}

/* ---------- decorative stars ---------- */
function paintStars(containerId, count){
  const el = document.getElementById(containerId);
  if (!el) return;
  let html = '';
  for (let i = 0; i < count; i++){
    const top = Math.random() * 100;
    const left = Math.random() * 100;
    const size = (Math.random() * 2 + 1).toFixed(1);
    const delay = (Math.random() * 3).toFixed(2);
    html += `<span class="star" style="top:${top}%; left:${left}%; width:${size}px; height:${size}px; animation-delay:${delay}s;"></span>`;
  }
  el.innerHTML = html;
}
['stars-before','stars-surprise'].forEach(id => paintStars(id, 40));

/* ---------- confetti on unlock ---------- */
function spawnConfetti(){
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#ff5d8f', '#ffaecb', '#ffffff'];
  let html = '';
  for (let i = 0; i < 36; i++){
    const left = Math.random() * 100;
    const delay = (Math.random() * 1.2).toFixed(2);
    const duration = (3 + Math.random() * 2).toFixed(2);
    const color = colors[Math.floor(Math.random() * colors.length)];
    html += `<span class="confetti" style="left:${left}%; background:${color}; animation-delay:${delay}s; animation-duration:${duration}s;"></span>`;
  }
  wrap.innerHTML = html;
}

/* ---------- init ---------- */
(function init(){
  showSection('before');
  tick();
  timer = setInterval(tick, 1000);
})();
</script>
</body>
</html>
